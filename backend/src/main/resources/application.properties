spring.application.name=foodrescue-backend
server.port=8081

# ─── Database Config: Neon PostgreSQL ────
spring.datasource.url=${DATABASE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# ── JPA ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Redis ──────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── JWT ────────────────────────────────────────────────────────────
jwt.secret=dGhpc2lzYXZlcnlsb25nYW5kY29tcGxleHNlY3JldGtleWZvckp3dHRva2VuZ2VuZXJhdGlvbmFuZHZhbGlkYXRpb24=
jwt.expiration=86400000

# ── Cloudinary ─────────────────────────────────────────────────────
cloudinary.cloud-name=demo
cloudinary.api-key=demo
cloudinary.api-secret=demo

# ── Twilio ─────────────────────────────────────────────────────────
twilio.account-sid=demo
twilio.auth-token=demo
twilio.phone-number=+1234567890

# ── Firebase ───────────────────────────────────────────────────────
firebase.config-path=classpath:firebase-service-account.json

# ── File Upload ────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── CORS ───────────────────────────────────────────────────────────
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ── Logging ────────────────────────────────────────────────────────────
logging.level.com.foodrescue=DEBUG
